name: Publish web image to GHCR

# Builds the web UI image (Dockerfile.web) and pushes it to the GitHub Container
# Registry. Runs on pushes to main and on version tags; PRs build only (no push)
# so the Dockerfile stays verified without publishing.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile.web"
      - "docker/**"
      - "frontend/**"
      - "job_hunt/**"
      - "pyproject.toml"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile.web"
      - "docker/**"
      - "frontend/**"
      - "job_hunt/**"
      - "pyproject.toml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the owner may not be.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/autopilot-jobhunt-web" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push for real events — never for PRs from forks.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
