name: Publish web image to GHCR

# Builds the web UI image (Dockerfile.web) and pushes it to the GitHub Container
# Registry. Publishing happens only at release time — on a version tag (v*) or a
# manual run (workflow_dispatch) — NOT on every merge to main. PRs still build the
# image (no push) so the Dockerfile stays verified. This lets several changes land
# on main and be shipped together when you're ready to cut a release.
on:
  push:
    tags: ["v*"]           # a release tag -> build + push (latest + semver)
  pull_request:
    branches: [main]
    paths:                 # PRs touching the image -> build only, to verify it
      - "Dockerfile.web"
      - "docker/**"
      - "frontend/**"
      - "job_hunt/**"
      - "pyproject.toml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:       # "publish :latest now" without a tag, when ready

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the owner may not be.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/autopilot-jobhunt-web" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          # :latest tracks the newest release (a v* tag) or a manual publish.
          # Version tags come from the pushed git tag; :sha is always added for
          # traceability. Nothing here fires on a plain merge to main anymore.
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push for real events — never for PRs from forks.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
